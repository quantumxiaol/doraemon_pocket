name: Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build mod jar
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle Wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" == v* ]]; then
            ./gradlew build -Pmod_version="${GITHUB_REF_NAME#v}"
          else
            ./gradlew build
          fi

      - name: Prepare jar artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t jars < <(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | sort)
          if [[ "${#jars[@]}" -eq 0 ]]; then
            echo "No mod jar was built under build/libs/." >&2
            exit 1
          fi
          jar_path="${jars[0]}"

          version="${GITHUB_SHA::7}"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          fi

          artifact_name="doraemon_pocket-${version}.jar"
          cp "${jar_path}" "${artifact_name}"
          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: doraemon-pocket-jar
          path: ${{ steps.artifact.outputs.artifact_name }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_NAME: ${{ steps.artifact.outputs.artifact_name }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${ARTIFACT_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${ARTIFACT_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Doraemon Pocket ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
